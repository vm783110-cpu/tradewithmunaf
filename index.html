<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trade With Munaf - Official</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif;}

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:18px;
      color:#fff;
      background:#0b0f14;
      overflow-x:hidden;
    }

    /* Background grid style */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 20% 20%, rgba(0, 140, 255, 0.12), transparent 40%),
        radial-gradient(circle at 80% 30%, rgba(0, 255, 180, 0.10), transparent 45%),
        radial-gradient(circle at 50% 80%, rgba(255, 200, 0, 0.10), transparent 40%),
        linear-gradient(135deg, rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(45deg, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: auto, auto, auto, 40px 40px, 40px 40px;
      opacity:0.9;
      z-index:-2;
    }

    .card{
      width:100%;
      max-width:420px;
      background:rgba(20,20,20,0.88);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:22px;
      padding:22px 18px 18px;
      box-shadow:0 10px 40px rgba(0,0,0,0.55);
      backdrop-filter: blur(12px);
      text-align:center;
      position:relative;
    }

    .avatarWrap{
      width:120px;
      height:120px;
      margin:0 auto 14px;
      border-radius:50%;
      padding:4px;
      background:linear-gradient(135deg,#ffcc00,#ff9900);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .avatar{
      width:100%;
      height:100%;
      border-radius:50%;
      object-fit:cover;
      border:2px solid rgba(0,0,0,0.6);
      background:#111;
    }

    .title{
      font-size:38px;
      font-weight:800;
      color:#ffcc00;
      line-height:1.05;
      margin-top:6px;
      text-transform:capitalize;
      text-shadow:0 2px 12px rgba(0,0,0,0.6);
    }

    .subtitle{
      margin:12px auto 18px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      font-size:18px;
      opacity:0.92;
    }

    .subtitle .tick{
      font-size:22px;
    }

    .pills{
      display:flex;
      justify-content:center;
      gap:12px;
      margin:8px 0 18px;
    }

    .pill{
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.12);
      padding:12px 18px;
      border-radius:14px;
      font-weight:700;
      font-size:16px;
      min-width:150px;
    }

    /* Telegram button with HARD blink */
    .tgBtn{
      width:100%;
      display:flex;
      justify-content:center;
      margin:12px 0 18px;
    }

    .tgBtn a{
      width:100%;
      text-decoration:none;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:18px 16px;
      border-radius:18px;
      font-size:22px;
      font-weight:900;
      color:white;
      background:linear-gradient(135deg,#0077ff,#00c6ff);
      box-shadow:0 0 0 rgba(0,198,255,0.0);
      position:relative;

      /* SUPER BLINK + PULSE */
      animation: hardBlink 0.55s infinite alternate, pulseGlow 0.8s infinite;
      transform:translateZ(0);
    }

    .tgBtn a:active{
      transform:scale(0.98);
    }

    @keyframes hardBlink{
      0%{
        filter:brightness(1);
        opacity:1;
      }
      100%{
        filter:brightness(1.7);
        opacity:0.65;
      }
    }

    @keyframes pulseGlow{
      0%{
        box-shadow:0 0 0px rgba(0,198,255,0.0), 0 0 0px rgba(0,198,255,0.0);
      }
      50%{
        box-shadow:0 0 25px rgba(0,198,255,0.65), 0 0 55px rgba(0,119,255,0.45);
      }
      100%{
        box-shadow:0 0 0px rgba(0,198,255,0.0), 0 0 0px rgba(0,198,255,0.0);
      }
    }

    .features{
      margin-top:10px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .feature{
      display:flex;
      align-items:center;
      gap:12px;
      padding:16px 14px;
      border-radius:16px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.10);
      font-size:18px;
      font-weight:700;
      text-align:left;
    }

    .ok{
      width:26px;
      height:26px;
      border-radius:50%;
      background:#00ff99;
      color:#001b10;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
      font-size:16px;
      flex-shrink:0;
      box-shadow:0 0 18px rgba(0,255,153,0.35);
    }

    .footerText{
      margin-top:18px;
      font-size:12px;
      opacity:0.7;
      line-height:1.4;
    }

    /* Anti fake click note */
    .note{
      margin-top:12px;
      font-size:13px;
      opacity:0.75;
    }
  </style>
</head>

<body>

  <div class="card">

    <!-- Profile Image -->

      <img class="avatar" src="profile.jpg" alt="Trade With Munaf" />

    <div class="title">

    <div class="tgBtn">

      </a>
    </div>

    <div class="features">
      <div class="feature">
        <div class="ok">✓</div>
        <div>Market Insights & Discussions</div>
      </div>

      <div class="feature">
        <div class="ok">✓</div>

    <div class="note">

  </div>

  <script>
    // Optional: prevent double clicks spam
    const btn = document.getElementById("joinBtn");
    let clicked = false;

    btn.addEventListener("click", function(){
      if(clicked){
        event.preventDefault();
        return;
      }
      clicked = true;

      // Re-enable after 2 sec
      setTimeout(()=>{ clicked = false; }, 2000);
    });
  </script>

</body>
</html>
